<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foodie Hub</title>
<style>
  
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #1f1c2c, #928dab);
  color: #333;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #141e30;
  color: #fff;
}
header input {
  width: 40%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}
header button {
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #00c9a7;
  color: white;
  cursor: pointer;
}
.categories {
  text-align: center;
  padding: 15px;
}
.categories button {
  margin: 5px;
  padding: 10px 18px;
  border-radius: 25px;
  border: none;
  background: #ffffff;
  cursor: pointer;
  transition: 0.3s;
}
.categories button:hover {
  background: #00c9a7;
  color: white;
}
#menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-8px);
}
.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
}
.card h3 {
  margin: 10px;
}
.card p {
  margin: 0 10px;
  color: #555;
}
.card button {
  margin: 10px;
  padding: 10px;
  width: 90%;
  border: none;
  border-radius: 20px;
  background: #00c9a7;
  color: white;
  cursor: pointer;
}
.cart-panel {
  position: fixed;
  right: -350px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #fff;
  box-shadow: -3px 0 15px rgba(0,0,0,0.5);
  padding: 15px;
  transition: 0.4s;
}
.cart-panel.active {
  right: 0;
}
.cart-header {
  display: flex;
  justify-content: space-between;
}
.close-btn {
  cursor: pointer;
  color: red;
}
.cart-item {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
}
.cart-panel button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #141e30;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}
footer {
  text-align: center;
  padding: 15px;
  background: #141e30;
  color: white;
}
</style>
</head>
<body>

<header>
  <h2>🍽️ Foodie Hub</h2>
  <input type="text" id="search" placeholder="Search delicious food..." onkeyup="searchFood()">
  <button onclick="toggleCart()">🛒 Cart</button>
</header>

<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('pizza')">Pizza</button>
  <button onclick="filterCategory('burger')">Burger</button>
  <button onclick="filterCategory('drinks')">Drinks</button>
  <button onclick="filterCategory('dessert')">Dessert</button>
</div>

<div id="menu"></div>

<div id="cartPanel" class="cart-panel">
  <div class="cart-header">
    <h3>🛒 Cart</h3>
    <span class="close-btn" onclick="toggleCart()">✖</span>
  </div>

  <div id="cartItems"></div>
  <h4 id="total">Total: ₹0</h4>
  <button onclick="placeOrder()">Place Order</button>
</div>

<footer>
  © 2026 Foodie Hub | Tasty & Fast 🚀
</footer>
<script>
let foodData = [
  {
    name:"Margherita Pizza",
    price:250,
    category:"pizza",
    img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
  },
  {
    name:"Veg Burger",
    price:150,
    category:"burger",
    img:"https://images.unsplash.com/photo-1550547660-d9450f859349"
  },
  {
    name:"Cold Coffee",
    price:120,
    category:"drinks",
    img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"
  },
  {
    name:"Chocolate Cake",
    price:200,
    category:"dessert",
    img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587"
  }
];

let cart = [];
function displayMenu(data){
  let menu = document.getElementById("menu");
  menu.innerHTML = "";

  data.forEach((item, index) => {
    menu.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
        <button onclick="addToCart(${index})">Add to Cart</button>
      </div>
    `;
  });
}
function searchFood(){
  let value = document.getElementById("search").value.toLowerCase();
  let filtered = foodData.filter(f => f.name.toLowerCase().includes(value));
  displayMenu(filtered);
}
function filterCategory(cat){
  if(cat === "all") displayMenu(foodData);
  else displayMenu(foodData.filter(f => f.category === cat));
}
function addToCart(index){
  cart.push(foodData[index]);
  updateCart();
}
function updateCart(){
  let cartItems = document.getElementById("cartItems");
  let total = 0;
  cartItems.innerHTML = "";
  cart.forEach(item => {
    total += item.price;
    cartItems.innerHTML += `<div class="cart-item">${item.name} - ₹${item.price}</div>`;
  });
  document.getElementById("total").innerText = "Total: ₹" + total;
}
function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("active");
}
function placeOrder(){
  alert("🎉 Order Placed Successfully!");
  cart = [];
  updateCart();
}
displayMenu(foodData);
</script>
</body>
</html>
